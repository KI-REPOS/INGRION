# /etc/nginx/sites-available/ingrion.conf
# Production Nginx configuration for INGRION

upstream django_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name yourdomain.com api.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Serve React SPA static files
    root /srv/ingrion/frontend/dist;
    index index.html;

    # React Router — serve index.html for all non-API routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to Django
    location /api/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting at nginx level
        limit_req zone=api burst=30 nodelay;

        # For large downloads
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        proxy_buffering off;
    }

    # Django static files
    location /static/ {
        alias /srv/ingrion/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Block direct access to protected binaries
    location /protected/ {
        deny all;
        return 404;
    }
}

# Rate limit zones
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/m;
